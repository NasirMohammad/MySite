apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nodeapp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nodeapp   # 👉 কোন deployment scale করবে

  minReplicas: 1   # 👉 minimum pod
  maxReplicas: 5   # 👉 maximum pod

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50   # 👉 CPU > 50% হলে scale
