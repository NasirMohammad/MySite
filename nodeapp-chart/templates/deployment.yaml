apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride | default "nodeapp" }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.nameOverride | default "nodeapp" }}
  template:
    metadata:
      labels:
        app: {{ .Values.nameOverride | default "nodeapp" }}
    spec:
      containers:
        - name: nodeapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-secret
                  key: BOT_TOKEN
