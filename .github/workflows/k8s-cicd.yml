name: Branch Based Helm CI/CD

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build -t erfanasir/mysite-nodeapp:${IMAGE_TAG} ./nodeapp

      - name: Push image
        run: |
          docker push erfanasir/mysite-nodeapp:${IMAGE_TAG}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl get nodes

      - name: Deploy to PROD with Helm
        if: github.ref == 'refs/heads/main'
        run: |
          export KUBECONFIG=kubeconfig.yaml
          helm upgrade --install nodeapp ./nodeapp-chart \
            -f ./nodeapp-chart/values-prod.yaml \
            --set image.repository=erfanasir/mysite-nodeapp \
            --set image.tag=${IMAGE_TAG} \
            --wait --timeout 5m

      - name: Rollback PROD on failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          export KUBECONFIG=kubeconfig.yaml
          helm rollback nodeapp 0 || true
          kubectl rollout status deployment/nodeapp --timeout=120s || true

      - name: Deploy to DEV with Helm
        if: github.ref == 'refs/heads/dev'
        run: |
          export KUBECONFIG=kubeconfig.yaml
          helm upgrade --install nodeapp-dev ./nodeapp-chart \
            -f ./nodeapp-chart/values-dev.yaml \
            --set image.repository=erfanasir/mysite-nodeapp \
            --set image.tag=${IMAGE_TAG} \
            --wait --timeout 5m

      - name: Rollback DEV on failure
        if: failure() && github.ref == 'refs/heads/dev'
        run: |
          export KUBECONFIG=kubeconfig.yaml
          helm rollback nodeapp-dev 0 || true
          kubectl rollout status deployment/nodeapp-dev --timeout=120s || true
