name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'nodeapp/**'
      - 'nodeapp2/**'
      - 'docker-compose.yml'
      - 'default.conf'
      - 'deploy.sh'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check workflow file exists
        run: test -f .github/workflows/deploy.yml

      - name: Check docker-compose file exists
        run: test -f docker-compose.yml

      - name: Check nginx config exists
        run: test -f default.conf

      - name: Check nginx upstream exists
        run: grep -q "upstream app_backend" default.conf

      - name: Check node app exists
        run: test -f nodeapp/app.js

      - name: Check node app 2 exists
        run: test -f nodeapp2/app.js

      - name: Check deploy script exists
        run: test -f deploy.sh

      - name: Check deploy script is executable
        run: test -x deploy.sh

  deploy:
    runs-on: ubuntu-latest
    needs: validate   # 👈 IMPORTANT
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

    steps:
      - name: Trigger EC2 deploy webhook
        run: |
          curl --fail --show-error --silent -X POST "http://18.237.107.51:9000/deploy" \
            -H "X-Deploy-Token: $DEPLOY_TOKEN"
