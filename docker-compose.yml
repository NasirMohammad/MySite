version: '3.8'

services:
  nodeapp:
    build: ./nodeapp
    container_name: nodeapp
    restart: always
    env_file:
      - .env
    networks:
      - mynet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
  nodeapp2:
    build: ./nodeapp2
    container_name: nodeapp2
    restart: always
    networks:
      - mynet
  nginx-proxy:
    image: nginx
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - nodeapp
    networks:
      - mynet

networks:
  mynet:
